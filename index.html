<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salvemos el Planeta - GreenTech</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Montserrat", sans-serif;
        background-color: #f4fdf4;
        margin: 0;
      }
      .hero-gigante {
        background-image: url("https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=75&w=1200&auto=format&fit=crop");
        background-size: cover;
        background-position: center;
        height: 100vh;
        color: white;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
      }
      .btn-eco-redundante {
        background-color: #28a745 !important;
        border-color: #1e7e34 !important;
        padding: 15px 40px;
        font-size: 1.5rem;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
      }
      .titulo-principal {
        font-size: clamp(2.5rem, 5vw, 4rem);
        font-weight: 700;
        margin: 0;
      }
      .texto-lead {
        font-size: clamp(1.1rem, 2.5vw, 1.5rem);
        margin-top: 1rem;
        max-width: 40rem;
      }
      .btn-eco {
        margin-top: 1.5rem;
        background-color: #28a745;
        border: 2px solid #1e7e34;
        padding: 0.8rem 2.5rem;
        font-size: 1.1rem;
        border-radius: 999px;
        box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
        color: #ffffff;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="hero-gigante">
      <h1 class="titulo-principal">Salvemos el Planeta</h1>
      <p class="texto-lead">
        Únete a la revolución verde de GreenTech. Menos datos, menos energía, más
        futuro.
      </p>
      <button class="btn-eco">
        <span aria-hidden="true">🌱</span>
        <span>Quiero ayudar</span>
      </button>
    </div>
    <footer>
      GreenTech Solutions &copy; 2026
      - Haciendo un mundo mejor sin freír tu CPU
    </footer>
  </body>
</html>
